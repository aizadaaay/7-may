<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7 Мамыр - Арнайы шақыру 🎖️</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #4ade80;
            --secondary: #16a34a;
            --danger: #f43f5e;
            --bg-dark: #fff5f7; /* Нежно-розовый фон */
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            color: #333;
        }

        #sakura-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(to bottom, #fff5f7 0%, #ffe4e8 100%);
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            text-align: center;
            transition: all 0.4s ease;
        }

        .hidden { display: none; opacity: 0; transform: scale(0.9); }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #d63384;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            position: relative;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
        }

        #noBtn {
            background: linear-gradient(135deg, #4ade80, #16a34a);
            color: white;
        }

        .qr-container {
            margin: 15px auto;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border-radius: 16px;
            background: #ffffff;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .details {
            text-align: left;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 0.9rem;
            border-left: 4px solid #ff758c;
        }

        #sad-text {
            color: var(--danger);
            font-size: 1.8rem;
            font-weight: 900;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <canvas id="sakura-canvas"></canvas>

    <div class="container">
        <!-- ЭКРАН 1 -->
        <div id="step1" class="card">
            <h1>7-ші мамырға сыйлық керек пе? 🎁<br><small style="font-size: 0.8rem; opacity: 0.7; color: #555;">Тез жауап беріңіз!</small></h1>
            <div class="btn-group">
                <button id="yesBtn">Иә, иә! 😍</button>
                <button id="noBtn">Жоқ, жоқ 🤐</button>
            </div>
        </div>

        <!-- ЭКРАН 2 -->
        <div id="step2" class="card hidden">
            <h1 id="sad-text">ӨКІНІШТІ... 💔<br>КЕШ ҚАЛДЫҢЫЗ!</h1>
        </div>

        <!-- ЭКРАН 3 -->
        <div id="step3" class="card hidden">
            <h1 style="color: #d63384;">7 МАМЫРМЕН! 🎖️</h1>
            <p style="font-size: 0.9rem; margin-bottom: 10px; color: #555;">
                Бұл қалжың еді! Міне, сіздің шақыруыңыз:
            </p>

            <div id="qr3d" class="qr-container" onclick="toggleView()"></div>
            
            <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">👆 Сканерлеу үшін басыңыз (тегіс болады)</p>

            <div class="details">
                <p>📍 <b>Орын:</b> Мерекелік кеш</p>
                <p>📅 <b>Күні:</b> 7 Мамыр, 2026</p>
                <p>✨ <b>Сыйлық:</b> VIP Жолдама</p>
            </div>
        </div>
    </div>

    <script>
        // ЛОГИКА КНОПОК
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');

        const moveBtn = () => {
            const x = Math.random() * (window.innerWidth - yesBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - yesBtn.offsetHeight - 40) + 20;
            yesBtn.style.position = 'fixed';
            yesBtn.style.left = x + 'px';
            yesBtn.style.top = y + 'px';
        };

        yesBtn.addEventListener('mouseover', moveBtn);
        yesBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveBtn(); });

        noBtn.addEventListener('click', () => {
            step1.classList.add('hidden');
            setTimeout(() => {
                step1.style.display = 'none';
                step2.style.display = 'block';
                setTimeout(() => step2.classList.remove('hidden'), 50);

                setTimeout(() => {
                    step2.classList.add('hidden');
                    setTimeout(() => {
                        step2.style.display = 'none';
                        step3.style.display = 'block';
                        setTimeout(() => step3.classList.remove('hidden'), 50);
                        if (!qrInitialized) init3DQR();
                    }, 600);
                }, 2000);
            }, 600);
        });

        // --- УЛУЧШЕННАЯ САКУРА ---
        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        let petals = [];

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            petals = [];
            // Создаем 60 пышных лепестков
            for (let i = 0; i < 60; i++) {
                petals.push(new SakuraPetal());
            }
        }

        class SakuraPetal {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h - h;
                this.r = Math.random() * 4 + 4; // Размер
                this.dx = Math.random() * 2 + 1; // Скорость по X
                this.dy = Math.random() * 1 + 1.5; // Скорость падения
                this.m = Math.random() * 2; // Множитель качания
                
                // Цвета: от нежно-розового до насыщенного
                const colors = ['#ffb7c5', '#ffc0cb', '#fae1e5', '#ff91a4'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.05;
            }
            draw() {
                if (this.y > h) this.reset();
                this.x += this.dx + Math.sin(this.angle) * 0.5;
                this.y += this.dy;
                this.angle += this.spin;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.beginPath();
                // Рисуем форму лепестка (эллипс с выемкой)
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.r, -this.r, -this.r, this.r, 0, this.r * 1.5);
                ctx.bezierCurveTo(this.r, this.r, this.r, -this.r, 0, 0);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
                
                if (this.x > w) this.x = -10;
            }
        }

        function renderSakura() {
            ctx.clearRect(0, 0, w, h);
            petals.forEach(p => p.draw());
            requestAnimationFrame(renderSakura);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        renderSakura();

        // 3D ИЗОМЕТРИЧЕСКИЙ QR (без изменений)
        let qrInitialized = false, is3DView = true, camera, scene, renderer, qrGroup;

        function init3DQR() {
            qrInitialized = true;
            const container = document.getElementById('qr3d');
            const size = container.clientWidth;

            const qr = qrcode(0, 'M');
            qr.addData('https://invitons.onrender.com/');
            qr.make();
            const count = qr.getModuleCount();

            scene = new THREE.Scene();
            const aspect = 1;
            const d = count * 0.6; 
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(20, 20, 20);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(size, size);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            qrGroup = new THREE.Group();
            scene.add(qrGroup);

            const geo = new THREE.BoxGeometry(1, 1, 1);
            geo.translate(0, 0.5, 0);

            const mWhite = new THREE.MeshLambertMaterial({ color: '#ffffff' });
            const mGreen = new THREE.MeshLambertMaterial({ color: '#4ade80' }); 
            const mPink = new THREE.MeshLambertMaterial({ color: '#ffb7c5' });  
            const mBrown = new THREE.MeshLambertMaterial({ color: '#8d6e63' }); 

            const half = count / 2;

            for (let x = 0; x < count; x++) {
                for (let z = 0; z < count; z++) {
                    const dark = qr.isDark(x, z);
                    const posX = x - half + 0.5;
                    const posZ = z - half + 0.5;
                    const dist = Math.sqrt(posX*posX + posZ*posZ);
                    const isCorner = (x < 7 && z < 7) || (x > count - 8 && z < 7) || (x < 7 && z > count - 8);

                    if (!dark) {
                        const b = new THREE.Mesh(geo, mWhite);
                        b.position.set(posX, 0, posZ);
                        b.scale.set(0.95, 0.1, 0.95);
                        qrGroup.add(b);
                    } else {
                        if (isCorner) {
                            const b = new THREE.Mesh(geo, mGreen);
                            b.position.set(posX, 0, posZ);
                            b.scale.set(0.95, 0.5, 0.95);
                            qrGroup.add(b);
                        } else if (dist < 2.5) {
                            const b = new THREE.Mesh(geo, mBrown);
                            b.position.set(posX, 0, posZ);
                            b.scale.set(0.95, 7, 0.95);
                            qrGroup.add(b);
                        } else if (dist < 8) {
                            const b = new THREE.Mesh(geo, mPink);
                            b.position.set(posX, 5, posZ);
                            b.scale.set(0.95, Math.max(2, 10 - dist*0.8), 0.95);
                            qrGroup.add(b);
                        } else {
                            const b = new THREE.Mesh(geo, mGreen);
                            b.position.set(posX, 0, posZ);
                            b.scale.set(0.95, 0.2, 0.95);
                            qrGroup.add(b);
                        }
                    }
                }
            }
            animate();
        }

        function toggleView() {
            is3DView = !is3DView;
            const targetY = is3DView ? 1 : 0.01;
            const targetCam = is3DView ? {x:20, y:20, z:20} : {x:0, y:30, z:0};
            new TWEEN.Tween(qrGroup.scale).to({y: targetY}, 800).easing(TWEEN.Easing.Quadratic.InOut).start();
            new TWEEN.Tween(camera.position).to(targetCam, 800).onUpdate(() => camera.lookAt(0,0,0)).start();
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            if (is3DView) qrGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
