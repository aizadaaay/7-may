<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7 Мамыр - Арнайы шақыру 🎖️</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <style>
        :root { --danger: #f43f5e; }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            box-sizing: border-box;
            margin: 0; padding: 0;
        }

        html, body { width: 100%; height: 100%; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 35%, #e8f5e9 70%, #fff9c4 100%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            color: #333;
        }

        #sakura-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 400px;
        }

        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 28px;
            padding: 28px 18px;
            box-shadow: 0 20px 60px rgba(255,100,130,0.18), 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            border: 1px solid rgba(255,183,197,0.4);
        }

        .hidden    { display: none !important; }
        .fade-out  { opacity: 0; transform: scale(0.93); }

        h1 { font-size: 1.4rem; margin-bottom: 20px; color: #111; line-height: 1.4; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        button {
            border: none; padding: 16px; border-radius: 18px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: transform .15s;
        }
        button:active { transform: scale(0.97); }

        #yesBtn {
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            color: white; box-shadow: 0 6px 20px rgba(201,24,74,.35);
        }
        #noBtn {
            background: linear-gradient(135deg, #4ade80, #16a34a);
            color: white; box-shadow: 0 6px 20px rgba(22,163,74,.3);
        }

        #sad-text {
            color: var(--danger); font-size: 1.9rem; font-weight: 900;
            line-height: 1.3; animation: shake .45s infinite;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-5px) rotate(-1deg); }
            75%      { transform: translateX(5px)  rotate(1deg); }
        }

        .qr-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border-radius: 16px;
            background: transparent;
            overflow: hidden;
            margin: 8px auto 4px;
            box-shadow: 0 6px 24px rgba(200,100,130,.15);
            position: relative;
        }
        .qr-wrap canvas { display: block; }

        /* Hint label with animated arrow */
        .qr-hint {
            font-size: .74rem; color: #aaa; margin-bottom: 6px;
            transition: opacity 0.5s;
        }

        .direct-link {
            display: inline-block; margin: 4px 0 10px;
            color: #c9184a; text-decoration: underline;
            font-size: .88rem; font-weight: 600;
        }

        .details {
            text-align: left;
            background: linear-gradient(135deg, #f0fdf4, #fce7f3);
            padding: 12px 14px; border-radius: 14px;
            font-size: .88rem; border-left: 4px solid #16a34a; line-height: 1.85;
        }

        /* Transition overlay label */
        #view-label {
            position: absolute;
            bottom: 8px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 700;
            color: #c9184a;
            pointer-events: none;
            transition: opacity 0.3s;
            white-space: nowrap;
            z-index: 5;
        }
    </style>
</head>
<body>

<canvas id="sakura-canvas"></canvas>

<div class="container">

    <!-- ЭКРАН 1 -->
    <div id="step1" class="card">
        <h1>7-ші мамырға сыйлық керек пе? 🎁<br>
            <small style="font-size:.78rem;opacity:.6;font-weight:400;">Тез жауап беріңіз!</small>
        </h1>
        <div class="btn-group">
            <button id="yesBtn">Иә, иә! 😍</button>
            <button id="noBtn">Жоқ, жоқ 🤐</button>
        </div>
    </div>

    <!-- ЭКРАН 2 -->
    <div id="step2" class="card hidden">
        <h1 id="sad-text">ӨКІНІШТІ... 💔<br>КЕШ ҚАЛДЫҢЫЗ!</h1>
    </div>

    <!-- ЭКРАН 3 -->
    <div id="step3" class="card hidden">
        <h1 style="color:#16a34a;">7 МАМЫРМЕН! 🎖️</h1>
        <p style="font-size:.88rem;color:#555;margin-bottom:6px;">Бұл қалжың еді! Міне, сіздің шақыруыңыз:</p>

        <div id="qr3d" class="qr-wrap" onclick="toggleView()">
            <div id="view-label">🌸 3D көру</div>
        </div>
        <p class="qr-hint" id="hint-text">👆 Сканерлеу үшін басыңыз (тегіс болады)</p>
        <a href="https://invitons.onrender.com/" class="direct-link" target="_blank" rel="noopener">Сайт арқылы көру →</a>

        <div class="details">
            <p>📍 <b>Орын:</b> Мерекелік кеш</p>
            <p>📅 <b>Күні:</b> 7 Мамыр, 2026</p>
            <p>✨ <b>Сыйлық:</b> VIP Жолдама</p>
        </div>
    </div>

</div>

<script>
/* ============ КНОПКИ ============ */
const yesBtn = document.getElementById('yesBtn');
const noBtn  = document.getElementById('noBtn');
const step1  = document.getElementById('step1');
const step2  = document.getElementById('step2');
const step3  = document.getElementById('step3');

function showCard(hide, show, cb) {
    hide.classList.add('fade-out');
    setTimeout(() => {
        hide.classList.add('hidden');
        hide.classList.remove('fade-out');
        show.classList.remove('hidden');
        if (cb) cb();
    }, 420);
}

function moveBtn() {
    const bw = yesBtn.offsetWidth  || 180;
    const bh = yesBtn.offsetHeight || 52;
    const x  = Math.random() * (window.innerWidth  - bw - 40) + 20;
    const y  = Math.random() * (window.innerHeight - bh - 40) + 20;
    yesBtn.style.cssText = `
        position:fixed;z-index:999;left:${x}px;top:${y}px;
        transition:left .2s,top .2s;border:none;padding:16px;
        border-radius:18px;font-size:1.1rem;font-weight:700;cursor:pointer;
        background:linear-gradient(135deg,#ff4d6d,#c9184a);color:white;`;
}

yesBtn.addEventListener('mouseover', moveBtn);
yesBtn.addEventListener('touchstart', e => { e.preventDefault(); moveBtn(); }, { passive: false });

noBtn.addEventListener('click', () => {
    yesBtn.style.cssText = '';
    showCard(step1, step2, null);
    setTimeout(() => {
        showCard(step2, step3, () => { if (!qrReady) buildQR(); });
    }, 5500);
});

/* ============ САКУРА (фон) ============ */
const sc  = document.getElementById('sakura-canvas');
const sct = sc.getContext('2d');
let SW = sc.width  = window.innerWidth;
let SH = sc.height = window.innerHeight;
window.addEventListener('resize', () => { SW = sc.width = window.innerWidth; SH = sc.height = window.innerHeight; });

const PAL = [[255,192,210],[255,210,228],[252,230,240],[255,175,200],[255,240,245],[248,200,218]];
function pFill() {
    const [r,g,b] = PAL[Math.floor(Math.random()*PAL.length)];
    return `rgba(${r},${g},${b},${(Math.random()*.35+.45).toFixed(2)})`;
}
function drawLeaf(c,x,y,sz,ang,al,fill) {
    c.save(); c.translate(x,y); c.rotate(ang); c.globalAlpha=al;
    c.beginPath();
    c.moveTo(0,-sz);
    c.bezierCurveTo( sz*1.05,-sz*.45, sz*1.05, sz*.55, 0, sz*.95);
    c.bezierCurveTo(-sz*1.05, sz*.55,-sz*1.05,-sz*.45, 0,-sz);
    c.fillStyle=fill; c.fill();
    c.beginPath(); c.moveTo(0,-sz*.85); c.quadraticCurveTo(sz*.15,0,0,sz*.85);
    c.strokeStyle='rgba(255,255,255,.4)'; c.lineWidth=sz*.13; c.stroke();
    c.restore();
}
const petals = Array.from({length:75}, () => ({
    x:Math.random()*SW, y:Math.random()*SH,
    sz:Math.random()*9+5, ang:Math.random()*Math.PI*2,
    spin:(Math.random()-.5)*.04, dx:(Math.random()-.42)*1.3, dy:Math.random()*1.1+.35,
    sw:Math.random()*Math.PI*2, ss:Math.random()*.014+.004, sa:Math.random()*1.8+.5,
    fill:pFill(), al:Math.random()*.4+.45
}));
const sparks = Array.from({length:30}, () => ({
    x:Math.random()*SW, y:Math.random()*SH,
    r:Math.random()*2.2+.6, dy:Math.random()*.6+.15, dx:(Math.random()-.5)*.4, op:Math.random()*.2+.08
}));
(function loop() {
    sct.clearRect(0,0,SW,SH);
    sparks.forEach(s => {
        sct.beginPath(); sct.arc(s.x,s.y,s.r,0,Math.PI*2);
        sct.fillStyle=`rgba(255,200,220,${s.op})`; sct.fill();
        s.y+=s.dy; s.x+=s.dx;
        if(s.y>SH+4){s.y=-4;s.x=Math.random()*SW;}
    });
    petals.forEach(p => {
        p.sw+=p.ss; p.x+=p.dx+Math.sin(p.sw)*p.sa; p.y+=p.dy; p.ang+=p.spin;
        if(p.y>SH+22){p.y=-22;p.x=Math.random()*SW;p.fill=pFill();}
        if(p.x>SW+22)p.x=-22; if(p.x<-22)p.x=SW+22;
        drawLeaf(sct,p.x,p.y,p.sz,p.ang,p.al,p.fill);
    });
    requestAnimationFrame(loop);
})();

/* ============================================================
   3D QR — САКУРА ДЕРЕВО с плавным переходом 3D <-> 2D
   ============================================================ */
let qrReady  = false;
let is3D     = true;
let animating = false;
let camera, scene, renderer, root;

// Камера анимация state
const camState = {
    // iso angles
    angleY: Math.PI / 4,     // 45°
    angleX: -Math.PI / 4.5, // чуть сверху
    dist: 1,
    zoom: 1,
    progress: 0             // 0 = 3D iso, 1 = 2D flat top
};

let N, half;
const blockData = []; // { mesh, type, col, row, px, pz, baseY, scaleY }

function buildQR() {
    qrReady = true;
    const wrap = document.getElementById('qr3d');
    const SIZE = wrap.clientWidth || 300;

    const qr = qrcode(0, 'M');
    qr.addData('https://invitons.onrender.com/');
    qr.make();
    N    = qr.getModuleCount();
    half = N / 2;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f0f2);

    /* --- Камера: OrthographicCamera ---
       Будем менять её position и lookAt через TWEEN для плавного перехода */
    const D = N * 0.7;
    camera = new THREE.OrthographicCamera(-D, D, D, -D, 0.1, 3000);

    // Стартовая изометрическая позиция
    setCamera3D();

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(SIZE, SIZE);
    renderer.setClearColor(0xf5f0f2, 1);
    renderer.shadowMap.enabled = false;
    wrap.appendChild(renderer.domElement);

    /* Свет — мягкий, как в оригинале */
    // Основное солнце — тёплое, не слишком яркое
    const sun = new THREE.DirectionalLight(0xfff8f0, 0.7);
    sun.position.set(2, 4, 2);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xfff0f5, 0.75));
    const bounce = new THREE.DirectionalLight(0xffe0f0, 0.2);
    bounce.position.set(-1, -1, -1);
    scene.add(bounce);
    const side = new THREE.DirectionalLight(0xf0f8ff, 0.15);
    side.position.set(-2, 2, -1);
    scene.add(side);

    root = new THREE.Group();
    scene.add(root);

    /* Материалы — приглушённая тёмная палитра */
    const M = {
        floor:  new THREE.MeshLambertMaterial({ color: 0xddd8d0 }),
        floorD: new THREE.MeshLambertMaterial({ color: 0x222222 }),
        green:  new THREE.MeshLambertMaterial({ color: 0x4e7a28 }),
        greenD: new THREE.MeshLambertMaterial({ color: 0x1a1a1a }),
        brown:  new THREE.MeshLambertMaterial({ color: 0x5c3a20 }),
        brownD: new THREE.MeshLambertMaterial({ color: 0x222222 }),
        pink0:  new THREE.MeshLambertMaterial({ color: 0x8c3055 }),  // центр — глубокий
        pink1:  new THREE.MeshLambertMaterial({ color: 0xa84870 }),
        pink2:  new THREE.MeshLambertMaterial({ color: 0xc06890 }),
        pink3:  new THREE.MeshLambertMaterial({ color: 0xd48aaa }),
        pink4:  new THREE.MeshLambertMaterial({ color: 0xe5afc4 }),  // края
        pinkD:  new THREE.MeshLambertMaterial({ color: 0x222222 }),
    };

    const geo = new THREE.BoxGeometry(1, 1, 1);
    geo.translate(0, 0.5, 0);

    for (let row = 0; row < N; row++) {
        for (let col = 0; col < N; col++) {
            const dark = qr.isDark(row, col);
            const px   = col - half + 0.5;
            const pz   = row - half + 0.5;
            const dist = Math.sqrt(px*px + pz*pz);

            const isCorner = (row < 7 && col < 7) ||
                             (row < 7 && col > N-8) ||
                             (row > N-8 && col < 7);

            // --- Плита (floor tile) ---
            const floorH3D = dark ? 0.35 : 0.12;
            const floorMat = dark ? M.green : M.floor;

            const floorMesh = new THREE.Mesh(geo, floorMat);
            floorMesh.position.set(px, 0, pz);
            floorMesh.scale.set(0.97, floorH3D, 0.97);
            root.add(floorMesh);

            blockData.push({
                mesh: floorMesh,
                type: 'floor',
                dark, px, pz, dist, isCorner,
                mat3D: floorMat,
                mat2D: floorMat,  // в 2D тот же цвет
                scaleY3D: floorH3D,
                scaleY2D: dark ? 0.4 : 0.12,
                posY3D: 0,
                posY2D: 0,
            });

            if (!dark) continue;

            if (isCorner) {
                const b = new THREE.Mesh(geo, M.green);
                b.position.set(px, 0, pz);
                b.scale.set(0.96, 0.7, 0.96);
                root.add(b);
                blockData.push({
                    mesh: b, type: 'corner',
                    dark, px, pz, dist,
                    mat3D: M.green,
                    mat2D: M.green,  // в 2D остаётся зелёным
                    scaleY3D: 0.7,
                    scaleY2D: 0.4,
                    posY3D: 0,
                    posY2D: 0,
                });
                continue;
            }

            /* СТВОЛ */
            if (dist < 1.7) {
                const trunkH = 11;
                const trunk = new THREE.Mesh(geo, M.brown);
                trunk.position.set(px, 0, pz);
                trunk.scale.set(0.88, trunkH, 0.88);
                root.add(trunk);
                blockData.push({
                    mesh: trunk, type: 'trunk',
                    dark, px, pz, dist,
                    mat3D: M.brown,
                    mat2D: M.brown,  // в 2D остаётся коричневым
                    scaleY3D: trunkH,
                    scaleY2D: 0.4,
                    posY3D: 0,
                    posY2D: 0,
                });
                continue;
            }

            /* КРОНА — правильный купол как в оригинале */
            if (dist < 10.5) {
                // Купол: максимум слоёв в центре, 0 на краях
                // Используем сферическую формулу для красивого купола
                const r = 10.5;
                const t = 1 - (dist / r);             // 1 в центре, 0 на краю
                const domeTop = Math.sqrt(Math.max(0, r*r - dist*dist)); // сфера
                const h = Math.max(1, domeTop * 0.85 + 1.5);

                // Цвет: темнее в центре, светлее к краям (как в оригинале)
                let mat3D;
                if      (dist < 2.5)  mat3D = M.pink0;
                else if (dist < 5.0)  mat3D = M.pink1;
                else if (dist < 7.5)  mat3D = M.pink2;
                else if (dist < 9.5)  mat3D = M.pink3;
                else                  mat3D = M.pink4;

                // База кроны: плавно снижается от центра к краям (дно тоже сферическое)
                const baseY = 4 + domeTop * 0.3;

                const crown = new THREE.Mesh(geo, mat3D);
                crown.position.set(px, baseY, pz);
                crown.scale.set(0.95, h, 0.95);
                root.add(crown);
                blockData.push({
                    mesh: crown, type: 'crown',
                    dark, px, pz, dist,
                    mat3D,
                    mat2D: mat3D,  // В 2D сохраняем тот же цвет — розовый!
                    scaleY3D: h,
                    scaleY2D: 0.4,
                    posY3D: baseY,
                    posY2D: 0,
                });
            }
        }
    }

    renderLoop();
}

/* ---- Camera helpers ---- */
const CAM_DIST = 55;

function setCamera3D() {
    // Классическая изометрия: камера смотрит сбоку-сверху под 35°
    const angle = Math.PI / 4; // 45° по горизонтали
    camera.position.set(
        CAM_DIST * Math.sin(angle),
        CAM_DIST * 0.82,           // ~40° от горизонта
        CAM_DIST * Math.cos(angle)
    );
    camera.lookAt(0, N * 0.28, 0); // смотрим чуть выше основания чтобы крона была по центру
    camera.up.set(0, 1, 0);
}

function setCamera2D() {
    camera.position.set(0, CAM_DIST * 1.5, 0.001);
    camera.lookAt(0, 0, 0);
    camera.up.set(0, 0, -1);
}

/* ---- Toggle with smooth animation ---- */
function toggleView() {
    if (animating) return;
    animating = true;

    const label = document.getElementById('view-label');
    const hint  = document.getElementById('hint-text');

    if (is3D) {
        // 3D → 2D
        label.style.opacity = '0';
        setTimeout(() => { label.textContent = '📷 3D қайту'; label.style.opacity = '1'; }, 350);
        hint.textContent = '👆 3D режимге оралу үшін басыңыз';

        // Animate camera
        const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
        const endPos   = { x: 0, y: CAM_DIST * 1.5, z: 0.001 };

        new TWEEN.Tween(startPos)
            .to(endPos, 900)
            .easing(TWEEN.Easing.Cubic.InOut)
            .onUpdate(() => {
                camera.position.set(startPos.x, startPos.y, startPos.z);
                // Interpolate lookAt from (0,N*0.15,0) to (0,0,0)
                const t = (startPos.y - CAM_DIST * 0.75) / (CAM_DIST * 1.5 - CAM_DIST * 0.75);
                const ly = N * 0.15 * (1 - t);
                camera.lookAt(0, ly, 0);
                camera.up.set(0, 1, 0);
            })
            .onComplete(() => {
                camera.position.set(0, CAM_DIST * 1.5, 0.001);
                camera.lookAt(0, 0, 0);
                camera.up.set(0, 0, -1);
            })
            .start();

        // Animate blocks: flatten crown & trunk
        blockData.forEach((b, i) => {
            const delay = Math.random() * 200;
            const fromScaleY = b.mesh.scale.y;
            const fromPosY   = b.mesh.position.y;
            const toScaleY   = b.scaleY2D;
            const toPosY     = b.posY2D;

            new TWEEN.Tween({ s: fromScaleY, y: fromPosY })
                .to({ s: toScaleY, y: toPosY }, 700)
                .delay(delay)
                .easing(TWEEN.Easing.Back.In)
                .onUpdate(({ s, y }) => {
                    b.mesh.scale.y = Math.max(0.01, s);
                    b.mesh.position.y = y;
                })
                .onComplete(() => {
                    b.mesh.scale.y    = b.scaleY2D;
                    b.mesh.position.y = b.posY2D;
                })
                .start();
        });

        setTimeout(() => { is3D = false; animating = false; }, 1100);

    } else {
        // 2D → 3D
        label.style.opacity = '0';
        setTimeout(() => { label.textContent = '🌸 3D көру'; label.style.opacity = '1'; }, 350);
        hint.textContent = '👆 Сканерлеу үшін басыңыз (тегіс болады)';

        // Reset materials first
        blockData.forEach(b => { b.mesh.material = b.mat3D; });

        // Animate camera back
        const startPos = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
        const endPos   = {
            x: CAM_DIST * Math.sin(Math.PI/4),
            y: CAM_DIST * 0.82,
            z: CAM_DIST * Math.cos(Math.PI/4)
        };

        new TWEEN.Tween(startPos)
            .to(endPos, 900)
            .easing(TWEEN.Easing.Cubic.InOut)
            .onUpdate(() => {
                camera.position.set(startPos.x, startPos.y, startPos.z);
                camera.up.set(0, 1, 0);
                camera.lookAt(0, N * 0.15, 0);
            })
            .onComplete(() => {
                camera.lookAt(0, N * 0.28, 0);
            })
            .start();

        // Animate blocks: raise up
        blockData.forEach((b) => {
            const delay = Math.random() * 300;
            new TWEEN.Tween({ s: b.mesh.scale.y, y: b.mesh.position.y })
                .to({ s: b.scaleY3D, y: b.posY3D }, 700)
                .delay(delay)
                .easing(TWEEN.Easing.Back.Out)
                .onUpdate(({ s, y }) => {
                    b.mesh.scale.y = Math.max(0.01, s);
                    b.mesh.position.y = y;
                })
                .onComplete(() => {
                    b.mesh.scale.y   = b.scaleY3D;
                    b.mesh.position.y = b.posY3D;
                })
                .start();
        });

        setTimeout(() => { is3D = true; animating = false; }, 1200);
    }
}

/* ---- Render loop ---- */
function renderLoop(t) {
    requestAnimationFrame(renderLoop);
    TWEEN.update(t);
    // Slow rotation only in 3D mode
    if (is3D && !animating && root) {
        root.rotation.y += 0.005;
    }
    if (renderer) renderer.render(scene, camera);
}
</script>
